<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattharadanai Sanitjairak | PenTester Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --accent: #c084fc;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            line-height: 1.6;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        header {
            position: fixed; top: 0; width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px); z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        nav {
            max-width: 1100px; margin: 0 auto; padding: 0.8rem 1rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { font-family: 'JetBrains Mono'; color: var(--primary); font-weight: 600; font-size: 0.85rem; }

        .nav-links { display: flex; list-style: none; gap: 1.2rem; align-items: center; }
        .nav-links a, .dropbtn { 
            text-decoration: none; color: var(--text-dim); 
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s;
        }
        .nav-links a:hover, .dropdown:hover .dropbtn { color: var(--primary); }

        .dropdown { position: relative; }
        .dropdown-content {
            visibility: hidden; opacity: 0; position: absolute; 
            top: 100%; right: 0; background: var(--card-bg); 
            min-width: 180px; border: 1px solid var(--border); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: 0.2s; z-index: 100;
        }
        .dropdown:hover .dropdown-content { visibility: visible; opacity: 1; }

        section { padding: 100px 1rem 40px; max-width: 800px; margin: 0 auto; }
        
        h1 { font-family: 'JetBrains Mono'; font-size: clamp(1.5rem, 7vw, 3rem); margin-bottom: 1rem; }
        .name-tag { font-family: 'JetBrains Mono'; color: var(--primary); font-size: 0.8rem; }

        .timeline { position: relative; border-left: 2px solid var(--border); padding-left: 20px; margin-left: 10px; }
        
        .cert-item {
            position: relative; background: var(--card-bg); padding: 1rem;
            border-radius: 12px; border: 1px solid var(--border);
            margin-bottom: 20px; display: flex; gap: 1rem; align-items: center;
        }
        .cert-item::before {
            content: ""; position: absolute; left: -31px; width: 12px; height: 12px;
            background: var(--primary); border: 3px solid var(--bg); border-radius: 50%;
        }

        .icon-sq { width: 45px; height: 45px; flex-shrink: 0; }
        .icon-sq img { width: 100%; height: auto; }

        /* Fix for Stats/Money overflow */
        .stats-box {
            background: linear-gradient(135deg, var(--card-bg), #0f172a);
            padding: 1.5rem 1rem; border-radius: 12px; border: 1px solid var(--primary);
            text-align: center; margin-top: 30px; width: 100%;
        }
        .stats-grid { 
            display: flex; justify-content: space-evenly; gap: 10px; margin-top: 1rem; 
        }
        .stat-item { flex: 1; min-width: 0; } /* Allows shrinking */
        .stat-val { 
            font-size: clamp(1rem, 4vw, 1.6rem); 
            color: var(--primary); font-weight: 600; 
            font-family: 'JetBrains Mono';
            word-wrap: break-word;
        }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; display: block; }

        /* Mobile Specific UI */
        @media (max-width: 480px) {
            nav { padding: 0.8rem 0.5rem; }
            .logo { display: none; } /* Hide logo to save space for nav items on tiny screens */
            nav { justify-content: center; }
            .nav-links { gap: 1rem; }
            
            .cert-item { flex-direction: column; text-align: center; padding: 1.5rem 1rem; }
            .icon-sq { width: 60px; height: 60px; margin-bottom: 0.5rem; }
            
            .stats-grid { flex-direction: column; gap: 1.5rem; }
        }

        footer { text-align: center; padding: 2rem 1rem; border-top: 1px solid var(--border); font-size: 0.7rem; opacity: 0.6; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">Bluedegard@TH:~#</div>
            <ul class="nav-links">
                <li><a href="#whoami">About</a></li>
                <li><a href="#certs" id="nav-certs">Certs</a></li>
                <li class="dropdown">
                    <span class="dropbtn">Sources ▾</span>
                    <div id="sources-dropdown" class="dropdown-content"></div>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="whoami">
            <span class="name-tag">> WHOAMI</span>
            <h1>Pattharadanai Sanitjairak</h1>
            <p style="color: var(--text-dim)">Junior Penetration Tester specializing in Active Directory & Red Teaming.</p>
        </section>

        <section id="certs">
            <h2 style="font-family: 'JetBrains Mono'; font-size: 1.2rem; color: var(--primary); margin-bottom: 2rem;">> CERT_LOG</h2>
            <div id="timeline-data" class="timeline"></div>

            <div class="stats-box">
                <span class="stat-label" style="margin-bottom: 10px;">Total Investment</span>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span id="total-usd" class="stat-val">$0</span>
                        <span class="stat-label">USD</span>
                    </div>
                    <div class="stat-item">
                        <span id="total-thb" class="stat-val">฿0</span>
                        <span class="stat-label">THB</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Pattharadanai | Connection Secure</p>
    </footer>

    <script>
        let globalUSD = 0, globalTHB = 0;

        function animate(obj, end, prefix) {
            let start = 0;
            let duration = 1500;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerText = prefix + Math.floor(progress * end).toLocaleString();
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        async function init() {
            try {
                // Fetch rate
                const r = await fetch('https://open.er-api.com/v6/latest/USD');
                const rd = await r.json();
                const rate = rd.rates.THB || 35.0;

                // Load Certs
                const c = await fetch('certs.json');
                const certs = await c.json();
                
                let html = certs.map(item => {
                    globalUSD += parseFloat(item.cost.replace(/[^0-9.]/g, '')) || 0;
                    return `<div class="cert-item">
                        <div class="icon-sq"><img src="${item.icon}"></div>
                        <div>
                            <div class="stat-label" style="color:var(--accent)">${item.date}</div>
                            <div style="font-weight:600; font-size:0.9rem;">${item.title}</div>
                        </div>
                    </div>`;
                }).join('');

                html += `<div class="cert-item" style="border-style:dashed; opacity:0.6">
                    <div class="icon-sq" style="display:flex; align-items:center; justify-content:center;"><i class="fa-solid fa-hourglass-start"></i></div>
                    <div><div style="font-weight:600; font-size:0.9rem;">TO BE CONTINUED</div><div class="stat-label">Saving Money...</div></div>
                </div>`;

                document.getElementById('timeline-data').innerHTML = html;
                globalTHB = globalUSD * rate;

                const obs = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        animate(document.getElementById('total-usd'), globalUSD, '$');
                        animate(document.getElementById('total-thb'), globalTHB, '฿');
                    }
                });
                obs.observe(document.querySelector('.stats-box'));

            } catch (err) { console.error(err); }
        }
        init();
    </script>
</body>
</html>
